name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate GitHub Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # Light Mode SVG: Soft cool slate grid with a deep purple snake
            dist/github-snake.svg?color_snake=#7928ca&color_dots=#ebedf0,#d1d5db,#9ca3af,#6b7280,#374151
            
            # Dark Mode SVG: Cyberpunk Neon Cyan Snake on a deep space purple grid
            dist/github-snake-dark.svg?color_snake=#00f5ff&color_dots=#161b22,#39235a,#5a2e91,#813bc9,#b159ff
